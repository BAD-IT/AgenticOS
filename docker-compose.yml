name: "AgenticOS"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agenticos_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agenticos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  orchestrator:
    build: .
    container_name: agenticos_orchestrator
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agenticos}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      - OLLAMA_HOST=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      - LLM_MODEL=${LLM_MODEL:-gemma4:12b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - INBOX_DIR=/workspace/inbox
      - OUTBOX_DIR=/workspace/outbox
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/app/src
      - ./ui:/app/ui
      - ./logs:/app/logs:rw
      - ./workspace/inbox:/workspace/inbox:rw
      - ./workspace/outbox:/workspace/outbox:rw
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  artifact_runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    container_name: agenticos_artifact_runner
    environment:
      - PYTHONUNBUFFERED=1
      - INBOX_DIR=/workspace/inbox
      - OUTBOX_DIR=/workspace/outbox
    volumes:
      - ./workspace/inbox:/workspace/inbox:ro
      - ./workspace/outbox:/workspace/outbox:rw
    network_mode: none
    mem_limit: 512m
    cpus: "0.5"
    restart: unless-stopped

volumes:
  pgdata:
